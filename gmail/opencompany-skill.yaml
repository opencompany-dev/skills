{
  "version": 2,
  "name": "opencompany/gmail",
  "description": "Compatibility Gmail read actions mapped to Google Workspace CLI backend.",
  "integration": "gmail",
  "provider": "gws",
  "read_only": true,
  "auth": {
    "secrets": [
      {
        "name": "GOOGLE_ACCESS_TOKEN",
        "required": true,
        "description": "Google OAuth access token."
      }
    ]
  },
  "actions": [
    {
      "id": "gmail.messages.list",
      "name": "List Gmail Messages",
      "description": "List messages through gws CLI compatibility mapping.",
      "permission_action": "gws.gmail.read",
      "permission_resource": "gmail",
      "read_only": true,
      "runner": {
        "type": "gws_cli",
        "command": ["gmail", "messages", "list", "--json"]
      }
    }
  ]
}
