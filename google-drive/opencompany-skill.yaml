{
  "version": 2,
  "name": "opencompany/google-drive",
  "description": "Compatibility Google Drive read actions mapped to Google Workspace CLI backend.",
  "integration": "google-drive",
  "provider": "gws",
  "read_only": true,
  "auth": {
    "secrets": [
      {
        "name": "GOOGLE_ACCESS_TOKEN",
        "required": true,
        "description": "Google OAuth access token."
      }
    ]
  },
  "actions": [
    {
      "id": "google-drive.files.list",
      "name": "List Drive Files",
      "description": "List drive files through gws CLI compatibility mapping.",
      "permission_action": "gws.drive.read",
      "permission_resource": "drive",
      "read_only": true,
      "runner": {
        "type": "gws_cli",
        "command": ["drive", "files", "list", "--json"]
      }
    }
  ]
}
