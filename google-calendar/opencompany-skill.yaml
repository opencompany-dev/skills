{
  "version": 2,
  "name": "opencompany/google-calendar",
  "description": "Compatibility Google Calendar read actions mapped to Google Workspace CLI backend.",
  "integration": "google-calendar",
  "provider": "gws",
  "read_only": true,
  "auth": {
    "secrets": [
      {
        "name": "GOOGLE_ACCESS_TOKEN",
        "required": true,
        "description": "Google OAuth access token."
      }
    ]
  },
  "actions": [
    {
      "id": "google-calendar.events.list",
      "name": "List Calendar Events",
      "description": "List calendar events through gws CLI compatibility mapping.",
      "permission_action": "gws.calendar.read",
      "permission_resource": "calendar",
      "read_only": true,
      "runner": {
        "type": "gws_cli",
        "command": ["calendar", "events", "list", "--calendar", "{{calendar_id}}", "--json"]
      }
    }
  ]
}
