{
  "version": 2,
  "name": "opencompany/slack",
  "description": "Read Slack workspace data through Platform Gateway.",
  "integration": "slack",
  "provider": "slack",
  "read_only": true,
  "auth": {
    "secrets": [
      {
        "name": "SLACK_BOT_TOKEN",
        "required": true,
        "description": "Slack bot token."
      }
    ]
  },
  "actions": [
    {
      "id": "slack.channels.list",
      "name": "List Slack Channels",
      "description": "List channels in the connected Slack workspace.",
      "permission_action": "slack.channels.read",
      "permission_resource": "channels",
      "read_only": true,
      "runner": {
        "type": "slack_api",
        "method": "GET",
        "path": "/conversations.list"
      }
    },
    {
      "id": "slack.channels.history",
      "name": "Read Slack Channel History",
      "description": "Read channel messages.",
      "permission_action": "slack.messages.read",
      "permission_resource": "messages",
      "read_only": true,
      "runner": {
        "type": "slack_api",
        "method": "GET",
        "path": "/conversations.history"
      }
    },
    {
      "id": "slack.thread.replies",
      "name": "Read Slack Thread Replies",
      "description": "Read replies in a thread.",
      "permission_action": "slack.messages.read",
      "permission_resource": "messages",
      "read_only": true,
      "runner": {
        "type": "slack_api",
        "method": "GET",
        "path": "/conversations.replies"
      }
    },
    {
      "id": "slack.users.list",
      "name": "List Slack Users",
      "description": "List workspace users.",
      "permission_action": "slack.users.read",
      "permission_resource": "users",
      "read_only": true,
      "runner": {
        "type": "slack_api",
        "method": "GET",
        "path": "/users.list"
      }
    },
    {
      "id": "slack.search.messages",
      "name": "Search Slack Messages",
      "description": "Search messages in workspace.",
      "permission_action": "slack.search.read",
      "permission_resource": "messages",
      "read_only": true,
      "runner": {
        "type": "slack_api",
        "method": "GET",
        "path": "/search.messages"
      }
    }
  ]
}
