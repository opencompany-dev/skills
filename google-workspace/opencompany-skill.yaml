{
  "version": 2,
  "name": "opencompany/google-workspace",
  "description": "Read Google Workspace data through gws CLI in Platform Gateway.",
  "integration": "google-workspace",
  "provider": "gws",
  "read_only": true,
  "auth": {
    "secrets": [
      {
        "name": "GOOGLE_ACCESS_TOKEN",
        "required": true,
        "description": "Google OAuth access token for gws read commands."
      }
    ]
  },
  "actions": [
    {
      "id": "gws.gmail.messages.list",
      "name": "List Gmail Messages",
      "description": "List Gmail messages with gws CLI.",
      "input_schema": {
        "type": "object",
        "properties": {},
        "additionalProperties": false
      },
      "permission_action": "gws.gmail.read",
      "permission_resource": "gmail",
      "read_only": true,
      "runner": {
        "type": "gws_cli",
        "command": ["gmail", "messages", "list", "--json"]
      }
    },
    {
      "id": "gws.gmail.message.get",
      "name": "Get Gmail Message",
      "description": "Read a single Gmail message with gws CLI.",
      "input_schema": {
        "type": "object",
        "properties": {
          "message_id": { "type": "string" }
        },
        "required": ["message_id"],
        "additionalProperties": false
      },
      "permission_action": "gws.gmail.read",
      "permission_resource": "gmail",
      "read_only": true,
      "runner": {
        "type": "gws_cli",
        "command": ["gmail", "messages", "get", "{{message_id}}", "--json"]
      }
    },
    {
      "id": "gws.calendar.events.list",
      "name": "List Calendar Events",
      "description": "List events from a calendar with gws CLI.",
      "input_schema": {
        "type": "object",
        "properties": {
          "calendar_id": { "type": "string" }
        },
        "required": ["calendar_id"],
        "additionalProperties": false
      },
      "permission_action": "gws.calendar.read",
      "permission_resource": "calendar",
      "read_only": true,
      "runner": {
        "type": "gws_cli",
        "command": ["calendar", "events", "list", "--calendar", "{{calendar_id}}", "--json"]
      }
    },
    {
      "id": "gws.drive.files.list",
      "name": "List Drive Files",
      "description": "List files in Google Drive with gws CLI.",
      "input_schema": {
        "type": "object",
        "properties": {},
        "additionalProperties": false
      },
      "permission_action": "gws.drive.read",
      "permission_resource": "drive",
      "read_only": true,
      "runner": {
        "type": "gws_cli",
        "command": ["drive", "files", "list", "--json"]
      }
    }
  ]
}
