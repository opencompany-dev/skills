{
  "version": 2,
  "name": "opencompany/linear",
  "description": "Read Linear workspace data through Platform Gateway.",
  "integration": "linear",
  "provider": "linear",
  "read_only": true,
  "auth": {
    "secrets": [
      {
        "name": "LINEAR_API_KEY",
        "required": true,
        "description": "Linear personal API key."
      }
    ]
  },
  "actions": [
    {
      "id": "linear.issues.list",
      "name": "List Linear Issues",
      "description": "List issues from Linear.",
      "input_schema": {
        "type": "object",
        "properties": {
          "first": { "type": "integer" },
          "query": { "type": "string" }
        },
        "additionalProperties": false
      },
      "permission_action": "linear.issues.read",
      "permission_resource": "issues",
      "read_only": true,
      "runner": {
        "type": "linear_graphql",
        "query": "query Issues($first: Int, $query: String) { issues(first: $first, filter: { title: { containsIgnoreCase: $query } }) { nodes { id identifier title priority createdAt updatedAt state { name } } } }"
      }
    },
    {
      "id": "linear.projects.list",
      "name": "List Linear Projects",
      "description": "List projects from Linear.",
      "input_schema": {
        "type": "object",
        "properties": {
          "first": { "type": "integer" }
        },
        "additionalProperties": false
      },
      "permission_action": "linear.projects.read",
      "permission_resource": "projects",
      "read_only": true,
      "runner": {
        "type": "linear_graphql",
        "query": "query Projects($first: Int) { projects(first: $first) { nodes { id name description state { name } } } }"
      }
    },
    {
      "id": "linear.teams.list",
      "name": "List Linear Teams",
      "description": "List teams from Linear.",
      "input_schema": {
        "type": "object",
        "properties": {
          "first": { "type": "integer" }
        },
        "additionalProperties": false
      },
      "permission_action": "linear.teams.read",
      "permission_resource": "teams",
      "read_only": true,
      "runner": {
        "type": "linear_graphql",
        "query": "query Teams($first: Int) { teams(first: $first) { nodes { id key name description } } }"
      }
    },
    {
      "id": "linear.cycles.list",
      "name": "List Linear Cycles",
      "description": "List cycles from Linear.",
      "input_schema": {
        "type": "object",
        "properties": {
          "first": { "type": "integer" }
        },
        "additionalProperties": false
      },
      "permission_action": "linear.cycles.read",
      "permission_resource": "cycles",
      "read_only": true,
      "runner": {
        "type": "linear_graphql",
        "query": "query Cycles($first: Int) { cycles(first: $first) { nodes { id number name startsAt endsAt } } }"
      }
    },
    {
      "id": "linear.comments.list",
      "name": "List Linear Comments",
      "description": "List comments for an issue.",
      "input_schema": {
        "type": "object",
        "properties": {
          "issueId": { "type": "string" },
          "first": { "type": "integer" }
        },
        "required": ["issueId"],
        "additionalProperties": false
      },
      "permission_action": "linear.comments.read",
      "permission_resource": "comments",
      "read_only": true,
      "runner": {
        "type": "linear_graphql",
        "query": "query Comments($issueId: String!, $first: Int) { comments(first: $first, filter: { issue: { id: { eq: $issueId } } }) { nodes { id body createdAt updatedAt user { id name } } } }"
      }
    }
  ]
}
